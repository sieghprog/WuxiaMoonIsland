{% extends 'base.html' %}

{% block title %}Lista de Categorias{% endblock %}

{% block conteudo %}
    <div class="container">
        <div class="row">
            <div class="col-sm-13" style="display: flex;flex-wrap: wrap;">
                    {% for category in categories %}
                            <div class="card mb-3 mr-3" style="width: 20%">
                                <div class="card-body">
                                    <a class="card-title h4" href="{% url 'category_view' category.category_name %}">{{ category.category_name}}</a><hr>
                                </div>
                            </div>
                    {% endfor %}
            </div>
        </div>
    </div>
{% endblock %}
